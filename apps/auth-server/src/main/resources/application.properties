spring.application.name=auth-server
server.port=9000

# Demo issuer (override in docker compose)
auth.issuer-uri=${AUTH_ISSUER_URI:http://localhost:9000}

# Demo SPA redirect and post logout URIs (comma-separated). Override in each environment.
demo-spa.redirect-uris=${DEMO_SPA_REDIRECT_URIS:http://localhost:3000/callback,http://localhost:5173/callback}
demo-spa.postlogout-redirect-uris=${DEMO_SPA_POSTLOGOUT_REDIRECT_URIS:http://localhost:3000,http://localhost:5173}

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

logging.level.com.microfocus.example=DEBUG
